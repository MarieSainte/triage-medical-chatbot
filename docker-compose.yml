version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  vllm:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
      - ${MODEL_PATH}:/app/model_lora
    command: >
      --model ${MODEL_ID}
      --dtype ${VLLM_DTYPE}
      --enable-lora
      --lora-modules medical_lora=/app/model_lora
      --max-model-len 2048
      --gpu-memory-utilization 0.7

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - VLLM_API_URL=http://vllm:8000/v1
    depends_on:
      - db
      - vllm

volumes:
  pgdata:
  hf_cache: