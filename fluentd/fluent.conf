
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<filter medical.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%dT%H:%M:%S.%L%z
  </parse>
</filter>


<match medical.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix medical-chatbot
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  tag_key fluentd_tag
  reconnect_on_error true
  reload_on_failure true
  reload_connections false
  <buffer>
    flush_interval 5s
    retry_max_times 5
  </buffer>
</match>


<match **>
  @type elasticsearch
  host elasticsearch
  port 9200
  logstash_format true
  logstash_prefix docker-logs
  logstash_dateformat %Y.%m.%d
  include_tag_key true
  tag_key fluentd_tag
  <buffer>
    flush_interval 10s
  </buffer>
</match>
